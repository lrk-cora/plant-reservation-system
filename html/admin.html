<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员后台 | 植愈空间预约系统</title>
  <link rel="stylesheet" href="../css/common.css">
  <style>
    .container{max-width:1200px;margin:20px auto;padding:20px;}
    .tab{display:flex;gap:10px;margin-bottom:20px;}
    .tab button{padding:10px 20px;border:none;background:#40916c;color:white;border-radius:6px;cursor:pointer;}
    .tab button.off{background:#aaa;}
    .box{border:1px solid #eee;padding:20px;border-radius:10px;margin-bottom:20px;}
    table{width:100%;border-collapse:collapse;margin:10px 0;}
    th,td{border:1px solid #ddd;padding:10px;text-align:center;}
    th{background:#f5f5f5;}
    input,select{width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:6px;}
    .btn-red{background:#e74c3c;color:white;border:none;padding:6px 10px;border-radius:4px;cursor:pointer;}
    .btn-green{background:#40916c;color:white;border:none;padding:6px 10px;border-radius:4px;cursor:pointer;}
    .login-box{max-width:400px;margin:100px auto;text-align:center;}
  </style>
</head>
<body>
<div id="loginBox" class="login-box">
  <h2>管理员登录</h2>
  <input type="password" id="pwd" placeholder="请输入管理员密码">
  <button class="btn btn-green" onclick="login()">登录后台</button>
</div>

<div id="mainBox" class="container" style="display:none;">
  <div class="tab">
    <button onclick="switchTab(1)">用户预约管理</button>
    <button onclick="switchTab(2)">植物数据管理</button>
    <a href="index.html"><button class="btn btn-outline">返回前台首页</button></a>
  </div>

  <!-- 预约管理面板 -->
  <div id="tab1" class="box">
    <h3>全部用户预约记录</h3>
    <table>
      <tr>
        <th>ID</th><th>姓名</th><th>手机号</th><th>预约植物</th><th>预约类型</th><th>日期时段</th><th>提交时间</th><th>操作</th>
      </tr>
      <tbody id="reserveTable"></tbody>
    </table>
  </div>

  <!-- 植物管理面板 -->
  <div id="tab2" class="box" style="display:none;">
    <h3>新增植物</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
      <input type="text" id="plantName" placeholder="植物名称">
      <select id="plantType">
        <option value="online">线上观植</option>
        <option value="offline">线下种植</option>
        <option value="both">双向可用</option>
      </select>
      <input type="text" id="plantDesc" placeholder="简介描述">
      <input type="text" id="plantImg" placeholder="图片文件名(放入images文件夹)">
      <select id="plantStatus">
        <option value="1">正常可预约</option>
        <option value="0">时段已满/下架</option>
      </select>
    </div>
    <button class="btn btn-green" onclick="addPlant()" style="margin:10px 0;">提交新增</button>

    <h3 style="margin-top:30px;">现有植物列表</h3>
    <table>
      <tr>
        <th>ID</th><th>植物名称</th><th>类型</th><th>简介</th><th>状态</th><th>操作</th>
      </tr>
      <tbody id="plantTable"></tbody>
    </table>
  </div>
</div>

<script>
const baseUrl = "http://localhost:3000/api";
// 管理员密码
const ADMIN_PWD = "admin123";
// 登录校验
function login(){
  const pwd = document.getElementById('pwd').value;
  if(pwd === ADMIN_PWD){
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('mainBox').style.display = 'block';
    renderReserve();
    renderPlant();
  }else{
    alert("密码错误");
  }
}
// 切换标签页
function switchTab(num){
  document.getElementById('tab1').style.display = num===1 ? 'block' : 'none';
  document.getElementById('tab2').style.display = num===2 ? 'block' : 'none';
}

// ========== 预约管理 ==========
async function renderReserve(){
  const res = await fetch(`${baseUrl}/reserve/all`);
  const result = await res.json();
  const list = result.data;
  let html = '';
  list.forEach(item=>{
    const typeName = item.reserveType==='online'?'线上观植':'线下种植';
    html += `<tr>
      <td>${item.id}</td>
      <td>${item.userName}</td>
      <td>${item.phone}</td>
      <td>${item.plantName}</td>
      <td>${typeName}</td>
      <td>${item.reserveDate} ${item.reserveTime}</td>
      <td>${item.createTime}</td>
      <td><button class="btn-red" onclick="delReserve(${item.id})">删除</button></td>
    </tr>`
  })
  document.getElementById('reserveTable').innerHTML = html || '<tr><td colspan="8">暂无预约数据</td></tr>';
}
async function delReserve(id){
  if(!confirm("确定删除该预约？")) return;
  await fetch(`${baseUrl}/reserve/del/${id}`,{method:"DELETE"});
  renderReserve();
}

// ========== 植物管理 ==========
async function renderPlant(){
  const res = await fetch(`${baseUrl}/plant/all`);
  const result = await res.json();
  const list = result.data;
  let html = '';
  const typeMap = {online:"线上",offline:"线下",both:"双向"};
  list.forEach(item=>{
    const statusText = item.status===1 ? "正常可约" : "已下架";
    html += `<tr>
      <td>${item.id}</td>
      <td>${item.name}</td>
      <td>${typeMap[item.type]}</td>
      <td>${item.desc}</td>
      <td>${statusText}</td>
      <td><button class="btn-red" onclick="delPlant(${item.id})">删除</button></td>
    </tr>`
  })
  document.getElementById('plantTable').innerHTML = html || '<tr><td colspan="6">暂无植物数据</td></tr>';
}
// 新增植物
async function addPlant(){
  const data = {
    name:document.getElementById('plantName').value,
    type:document.getElementById('plantType').value,
    desc:document.getElementById('plantDesc').value,
    img:document.getElementById('plantImg').value,
    status:Number(document.getElementById('plantStatus').value)
  }
  if(!data.name){alert("请填写植物名称");return;}
  await fetch(`${baseUrl}/plant/add`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  })
  alert("新增成功");
  renderPlant(); // 【新增这一行】提交完成自动刷新列表
  // 清空输入框
  document.getElementById('plantName').value = '';
  document.getElementById('plantDesc').value = '';
  document.getElementById('plantImg').value = '';
}
// 删除植物
async function delPlant(id){
  if(!confirm("确定删除该植物？")) return;
  await fetch(`${baseUrl}/plant/del/${id}`,{method:"DELETE"});
  renderPlant();
}
</script>
</body>
</html>
