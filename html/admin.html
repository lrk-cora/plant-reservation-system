<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员后台 | 植愈空间预约系统</title>
  <link rel="stylesheet" href="../css/common.css">
  <style>
    .container{max-width:1200px;margin:20px auto;padding:20px;}
    .tab{display:flex;gap:10px;margin-bottom:20px;}
    .tab button{padding:10px 20px;border:none;background:#40916c;color:white;border-radius:6px;cursor:pointer;}
    .tab button.off{background:#aaa;}
    .box{border:1px solid #eee;padding:20px;border-radius:10px;margin-bottom:20px;}
    table{width:100%;border-collapse:collapse;margin:10px 0;}
    th,td{border:1px solid #ddd;padding:10px;text-align:center;}
    th{background:#f5f5f5;}
    input,select{width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:6px;}
    .btn-red{background:#e74c3c;color:white;border:none;padding:6px 10px;border-radius:4px;cursor:pointer;}
    .btn-green{background:#40916c;color:white;border:none;padding:6px 10px;border-radius:4px;cursor:pointer;}
    .login-box{max-width:400px;margin:100px auto;text-align:center;}
    .img-preview{width:100px;height:80px;object-fit:cover;}
  </style>
</head>
<body>
<div id="loginBox" class="login-box">
  <h2>管理员登录</h2>
  <input type="password" id="pwd" placeholder="请输入管理员密码">
  <button class="btn btn-green" onclick="login()">登录后台</button>
</div>

<div id="mainBox" class="container" style="display:none;">
  <div class="tab">
    <button onclick="switchTab(1)">用户预约管理</button>
    <button onclick="switchTab(2)">植物数据管理</button>
    <!-- 新增第三个标签：生长记录管理 -->
    <button onclick="switchTab(3)">植物生长记录管理</button>
    <a href="index.html"><button class="btn btn-outline">返回前台首页</button></a>
  </div>

  <!-- 1 预约管理面板 -->
  <div id="tab1" class="box">
    <h3>全部用户预约记录</h3>
    <table>
      <tr>
        <th>ID</th><th>姓名</th><th>手机号</th><th>预约植物</th><th>预约类型</th><th>日期时段</th><th>提交时间</th><th>操作</th>
      </tr>
      <tbody id="reserveTable"></tbody>
    </table>
  </div>

  <!-- 2 植物管理面板 -->
  <div id="tab2" class="box" style="display:none;">
    <h3>新增植物</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
      <input type="text" id="plantName" placeholder="植物名称">
      <select id="plantType">
        <option value="online">线上观植</option>
        <option value="offline">线下种植</option>
        <option value="both">双向可用</option>
      </select>
      <input type="text" id="plantDesc" placeholder="简介描述">
      <input type="text" id="plantImg" placeholder="图片文件名(放入images文件夹)">
      <select id="plantStatus">
        <option value="1">正常可预约</option>
        <option value="0">时段已满/下架</option>
      </select>
    </div>
    <button class="btn btn-green" onclick="addPlant()" style="margin:10px 0;">提交新增</button>

    <h3 style="margin-top:30px;">现有植物列表</h3>
    <table>
      <tr>
        <th>ID</th><th>植物名称</th><th>类型</th><th>简介</th><th>状态</th><th>操作</th>
      </tr>
      <tbody id="plantTable"></tbody>
    </table>
  </div>

  <!-- 【新增3 生长记录管理面板】 -->
  <div id="tab3" class="box" style="display:none;">
    <h3>新增植物生长记录</h3>
    <div style="max-width:700px;">
      <label>选择植物</label>
      <select id="logPlantSelect"></select>
      <label>图片文件名（放入images文件夹）</label>
      <input type="text" id="logImgName" placeholder="例如：flower.jpg">
      <label>当日生长描述</label>
      <textarea id="logDesc" rows="4" style="width:100%;padding:10px;border:1px solid #ccc;border-radius:6px;" placeholder="填写植物今日生长情况"></textarea>
      <button class="btn btn-green" onclick="submitPlantLog()" style="margin-top:10px;">提交记录</button>
    </div>

    <h3 style="margin-top:30px;">全部生长记录列表</h3>
    <table>
      <tr>
        <th>植物名称</th>
        <th>预览图片</th>
        <th>生长描述</th>
        <th>上传时间</th>
        <th>操作</th>
      </tr>
      <tbody id="logTable"></tbody>
    </table>
  </div>

</div>

<script>
const baseUrl = "http://localhost:3000/api";
// 管理员密码
const ADMIN_PWD = "admin123";
let allPlantList = []; // 全局缓存全部植物，给下拉框使用

// 登录校验
function login(){
  const pwd = document.getElementById('pwd').value;
  if(pwd === ADMIN_PWD){
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('mainBox').style.display = 'block';
    // 【顺序修正】先加载植物数据，再执行依赖植物的函数
    initAllData();
  }else{
    alert("密码错误");
  }
}

// 统一初始化数据，保证顺序
async function initAllData(){
  await renderPlant();  // 先拿植物数据，给allPlantList赋值
  renderLogPlantSelect();
  renderReserve();
  renderPlantLog();
}

// 切换标签页
function switchTab(num){
  document.getElementById('tab1').style.display = num===1 ? 'block' : 'none';
  document.getElementById('tab2').style.display = num===2 ? 'block' : 'none';
  document.getElementById('tab3').style.display = num===3 ? 'block' : 'none';
}

// ========== 预约管理 ==========
// ========== 预约管理（修改后的完整函数） ==========
async function renderReserve(){
  const res = await fetch(`${baseUrl}/reserve/all`);
  const result = await res.json();
  const list = result.data;
  let html = '';
  list.forEach(item=>{
    const typeName = item.reserveType==='online'?'线上观植':'线下种植';
    // 判断是否管理员已取消
    const isCancel = item.status === 0;
    // 已取消行标浅红色底色
    const rowBg = isCancel ? 'background-color:#ffe6e6;' : '';
    // 按钮判断：已取消则灰色禁用，正常显示删除按钮
    let btnHtml = '';
    if(isCancel){
      btnHtml = `<button disabled style="background:#cccccc;color:#777;border:none;padding:6px 10px;border-radius:4px;">已取消</button>`;
    }else{
      btnHtml = `<button class="btn-red" onclick="delReserve(${item.id})">删除</button>`;
    }

    html += `<tr style="${rowBg}">
      <td>${item.id}</td>
      <td>${item.userName}</td>
      <td>${item.phone}</td>
      <td>${item.plantName}</td>
      <td>${typeName}</td>
      <td>${item.reserveDate} ${item.reserveTime}</td>
      <td>${item.createTime}</td>
      <td>${btnHtml}</td>
    </tr>`
  })
  document.getElementById('reserveTable').innerHTML = html || '<tr><td colspan="8">暂无预约数据</td></tr>';
}
async function delReserve(id){
  if(!confirm("确定要取消该用户预约吗？取消后用户前台会收到失败通知")) return;
  // 调用软取消接口
  await fetch(`${baseUrl}/reserve/cancel/${id}`,{method:"PUT"});
  renderReserve();
}

// ========== 植物管理 ==========
// ========== 植物管理（修复后的正确代码） ==========
async function renderPlant(){
  const res = await fetch(`${baseUrl}/plant/all`);
  const result = await res.json();
  allPlantList = result.data;
  const list = allPlantList;
  let html = '';
  const typeMap = {online:"线上观植",offline:"线下种植",both:"双向可用"};
  const statusMap = {1:"正常可预约",0:"已下架"};
  list.forEach(item=>{
    html += `<tr>
      <td>${item.id}</td>
      <td>${item.name}</td>
      <td>${typeMap[item.type]}</td>
      <td>${item.desc}</td>
      <td>${statusMap[item.status]}</td>
      <td><button class="btn-red" onclick="delPlant(${item.id})">删除</button></td>
    </tr>`
  })
  document.getElementById('plantTable').innerHTML = html || '<tr><td colspan="6">暂无植物数据</td></tr>';
}
// 新增植物
async function addPlant(){
  const data = {
    name:document.getElementById('plantName').value,
    type:document.getElementById('plantType').value,
    desc:document.getElementById('plantDesc').value,
    img:document.getElementById('plantImg').value,
    status:Number(document.getElementById('plantStatus').value)
  }
  if(!data.name){alert("请填写植物名称");return;}
  await fetch(`${baseUrl}/plant/add`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  })
  alert("新增成功");
  await renderPlant();
  renderLogPlantSelect(); // 同步刷新下拉框
  document.getElementById('plantName').value = '';
  document.getElementById('plantDesc').value = '';
  document.getElementById('plantImg').value = '';
}
// 删除植物
async function delPlant(id){
  if(!confirm("确定删除该植物？")) return;
  await fetch(`${baseUrl}/plant/del/${id}`,{method:"DELETE"});
  await renderPlant();
  renderLogPlantSelect();
}

// ========== 生长记录全套方法 ==========
// 加载植物下拉选择框
function renderLogPlantSelect(){
  const sel = document.getElementById('logPlantSelect');
  sel.innerHTML = '<option value="">请选择植物</option>';
  if(allPlantList && allPlantList.length>0){
    allPlantList.forEach(item=>{
      sel.innerHTML += `<option value="${item.id}">${item.name}</option>`
    })
  }
}

// 提交新增生长记录
async function submitPlantLog(){
  const plantId = document.getElementById('logPlantSelect').value;
  const imgName = document.getElementById('logImgName').value.trim();
  const desc = document.getElementById('logDesc').value.trim();
  if(!plantId || !imgName || !desc){
    alert('请完整填写全部内容！');
    return;
  }
  const sendData = {
    id: Date.now(),
    plantId: Number(plantId),
    img: imgName,
    desc: desc,
    time: new Date().toLocaleString()
  }
  await fetch(`${baseUrl}/plant/log/add`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(sendData)
  })
  alert('生长记录提交成功！');
  renderPlantLog();
  // 清空输入框
  document.getElementById('logImgName').value = '';
  document.getElementById('logDesc').value = '';
  document.getElementById('logPlantSelect').value = "";
}

// 渲染所有生长记录（增加判空修复报错）
async function renderPlantLog(){
  const res = await fetch(`${baseUrl}/plant/log/all`);
  const result = await res.json();
  const logList = result.data || []; // 兜底为空数组，杜绝undefined
  const table = document.getElementById('logTable');
  if(logList.length === 0){
    table.innerHTML = '<tr><td colspan="5">暂无生长记录</td></tr>';
    return;
  }
  let html = '';
  logList.forEach(log=>{
    const plantInfo = allPlantList.find(p=>p.id === log.plantId);
    html += `<tr>
      <td>${plantInfo?.name || '未知植物'}</td>
      <td><img src="../images/${log.img}" class="img-preview"></td>
      <td>${log.desc}</td>
      <td>${log.time}</td>
      <td><button class="btn-red" onclick="deleteLog(${log.id})">删除</button></td>
    </tr>`
  })
  table.innerHTML = html;
}

// 删除生长记录
async function deleteLog(id){
  if(!confirm('确定删除这条生长记录？')) return;
  await fetch(`${baseUrl}/plant/log/del?id=${id}`);
  renderPlantLog();
}
</script>
</body>
</html>
