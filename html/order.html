<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>预约下单 | 植愈空间</title>
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
<header class="header-nav">
  <div class="container nav-wrap">
    <a href="index.html" class="logo">植愈空间</a>
    <ul class="nav-links">
      <li><a href="index.html">首页</a></li>
      <li><a href="plant-list.html">全部植物</a></li>
      <li><a href="rule.html">预约须知</a></li>
      <li><a href="user-center.html">我的预约</a></li>
    </ul>
  </div>
</header>

<main class="container" style="padding:40px 0; max-width:700px;">
  <div class="card" style="padding:32px;">
    <h2 style="font-size:26px; margin-bottom:24px; color:#1b4332;">提交预约信息</h2>
    <form id="reserveForm">
      <div style="margin-bottom:20px;">
        <label style="display:block; margin-bottom:8px; font-weight:500;">预约类型</label>
        <select id="reserveType">
          <option value="online">线上云观植</option>
          <option value="offline">线下到店种植</option>
        </select>
      </div>
      <div style="margin-bottom:20px;">
        <p>选择植物</p>
        <input id="plantNameInput" readonly style="width:100%;padding:10px;border:1px solid #ccc;border-radius:6px;" placeholder="自动带入选中植物">
        <!-- 隐藏存放植物id的输入框，提交要用，用户看不见 -->
        <input type="hidden" id="plantIdInput">
      </div>
      <div style="margin-bottom:20px;">
        <label style="display:block; margin-bottom:8px; font-weight:500;">预约日期</label>
        <input type="date" name="reserveDate" required style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px;">
      </div>
      <div style="margin-bottom:20px;">
        <label style="display:block; margin-bottom:8px; font-weight:500;">预约时段</label>
        <select name="reserveTime" required style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px;">
          <option value="09:00-11:00">09:00-11:00</option>
          <option value="11:00-14:00">11:00-14:00</option>
          <option value="14:00-16:00">14:00-16:00</option>
          <option value="16:00-18:00">16:00-18:00</option>
        </select>
      </div>
      <div style="margin-bottom:20px;">
        <label style="display:block; margin-bottom:8px; font-weight:500;">您的姓名</label>
        <input type="text" name="userName" placeholder="请填写真实姓名" required style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px;">
      </div>
      <div style="margin-bottom:20px;">
        <label style="display:block; margin-bottom:8px; font-weight:500;">联系电话</label>
        <input type="tel" name="phone" placeholder="手机号" required style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px;">
      </div>
      <div style="margin-bottom:30px;">
        <label style="display:block; margin-bottom:8px; font-weight:500;">备注（选填）</label>
        <textarea name="remark" rows="3" placeholder="特殊需求说明" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px;"></textarea>
      </div>
      <button type="button" class="btn btn-green" style="width:100%; font-size:16px;" onclick="submitReserve()">确认提交预约</button>
    </form>
  </div>
</main>

<!-- 提交成功弹窗 -->
<div class="mask" id="successModal">
  <div class="modal" style="text-align:center;">
    <h3 style="font-size:22px; margin-bottom:16px; color:#2d6a4f;">预约提交成功！</h3>
    <p style="margin-bottom:24px;">可前往【我的预约】查看全部订单</p>
    <div style="display:flex; gap:16px; justify-content:center;">
      <a href="user-center.html"><button class="btn btn-green">查看我的预约</button></a>
      <button class="btn btn-outline" onclick="closeModal('successModal')">继续预约</button>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="container">
    <h3 style="margin-bottom:12px;">植愈空间 植物预约基地</h3>
    <p>地址：XX市XX区园艺产业园3号大棚</p>
    <p>联系电话：138-XXXX-XXXX</p>
    <p>营业时间：9:00-18:00</p>
    <a href="rule.html" style="text-decoration:underline;">完整预约规则</a>
  </div>
</footer>

<script src="../js/common.js"></script>
<script>
const plantNameMap = {};
let targetPlantId = '';

window.onload = async function(){
  const params = new URLSearchParams(location.search);
  targetPlantId = params.get('id');
  const plantType = params.get('type');

  const res = await fetch(`${baseUrl}/plant/all`);
  const result = await res.json();
  const plantList = result.data;
  let targetPlant = null;

  plantList.forEach(plant => {
    plantNameMap[plant.id] = plant.name;
    if(String(plant.id) === targetPlantId){
      targetPlant = plant;
    }
  });

  if(targetPlant){
    document.getElementById('plantNameInput').value = targetPlant.name;
    document.getElementById('plantIdInput').value = targetPlant.id;
  }

  // ========== 预约类型自动逻辑 ==========
  const typeSelect = document.getElementById('reserveType');
  if(plantType === 'online'){
    typeSelect.value = 'online';
    typeSelect.disabled = true; // 锁定线上
  }else if(plantType === 'offline'){
    typeSelect.value = 'offline';
    typeSelect.disabled = true; // 锁定线下
  }else if(plantType === 'both'){
    typeSelect.disabled = false; // 双向，放开手动选择
  }
}

// 提交预约方法
// 提交预约方法
async function submitReserve(){
  const reserveType = document.getElementById('reserveType').value;
  const plantId = document.getElementById('plantIdInput').value;
  const reserveDate = document.querySelector('[name="reserveDate"]').value;
  const reserveTime = document.querySelector('[name="reserveTime"]').value;
  const userName = document.querySelector('[name="userName"]').value;
  const phone = document.querySelector('[name="phone"]').value;
  const remark = document.querySelector('[name="remark"]').value;

  if(!userName || !phone){
    alert('姓名和手机号不能为空！');
    return;
  }
  if(!reserveDate){
    alert('请选择预约日期');
    return;
  }

  const submitData = {
    reserveType: reserveType,
    plantId: Number(plantId),
    plantName: plantNameMap[plantId],
    reserveDate: reserveDate,
    reserveTime: reserveTime,
    userName: userName,
    phone: phone,
    remark: remark
  };

  await fetch(`${baseUrl}/reserve/add`, {
    method: 'POST',
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(submitData)
  });
  // ========= 新增代码：把本次手机号存入本地 =========
  localStorage.setItem("currentUserPhone", phone);
  location.href = 'success.html';
}
</script>
</body>
</html>
